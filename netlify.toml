[build]
  # Install all workspace deps from the monorepo root (this hydrates
  # apps/improving-di/node_modules and the two sibling workspaces it
  # imports from at build time: better-di-in and topics).
  command = "npm install && npm run build --workspace=improving-di"
  # Vite emits the production bundle here. index.html, assets/* and
  # the copied public/ contents (titan/, logos/, report-section/)
  # all live under this dir.
  publish = "apps/improving-di/dist"

[build.environment]
  # improving-di's package.json declares "engines": { "node": ">=20" }
  # Pin Node 20 LTS so Netlify doesn't drift onto a newer major
  # that breaks the build.
  NODE_VERSION = "20"

# Single-page app fallback — every URL renders index.html so client
# routing (the report tabs) works on deep links and reloads.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed Vite assets are immutable — cache aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must always revalidate so deploys are not stuck on an
# old bundle reference while the browser keeps stale CSS/JS.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
